load_module modules/ngx_http_modsecurity_module.so;

events { 
    worker_connections 1024; 
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_max_body_size 10M;    
    client_body_buffer_size 128k; 
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' ws: wss:; connect-src 'self' https://data.streamlit.io; font-src 'self' data:; img-src 'self' data: blob:;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    limit_req_zone $binary_remote_addr zone=ddos_limit:10m rate=20r/s;

    upstream streamlit_backend {
        server streamlit-app:8501;
    }

    server {
        listen 80;
        server_name localhost;

        # ENABLE MODSECURITY WAF GLOBALLY FOR THE SERVER
        modsecurity on;
        modsecurity_rules_file /etc/modsecurity/modsecurity.conf;

        limit_req zone=ddos_limit burst=100 nodelay;

        # --- NEW: WAF EXCEPTION FOR STREAMLIT INTERNAL APIs ---
        # Bypasses the WAF for WebSockets and File Upload endpoints
        location /_stcore/ {
            modsecurity off; 
            
            proxy_pass http://streamlit_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 900s;
            proxy_connect_timeout 900s;
        }

        # --- MAIN APPLICATION FRONT DOOR ---
        # WAF remains ON for all user-facing pages and form submissions
        location / {
            auth_basic "TTB Identity Provider (Demo Passthrough)";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://streamlit_backend;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 900s;
            proxy_connect_timeout 900s;

            proxy_set_header X-Forwarded-User "admin";
            proxy_set_header X-Forwarded-Groups "TTB_Agent";
            proxy_set_header Authorization "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhZG1pbiIsInJvbGUiOiJUVEJfQWdlbnQiLCJpYXQiOjE1MTYyMzkwMjJ9.MockSignatureForDemoPhase1";
        }
    }
}